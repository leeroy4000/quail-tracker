<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Quail">
<meta name="theme-color" content="#5C3D1E">
<link rel="apple-touch-icon" href="/static/icon-180.png">
<link rel="manifest" href="/static/manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192.png">
<title>Quail Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --ink:       #2A1F0E;
  --bark:      #5C3D1E;
  --clay:      #8B5E3C;
  --tan:       #C49A6C;
  --straw:     #E8C87A;
  --parchment: #F5EDD8;
  --cream:     #FBF7EF;
  --sage:      #6B8C6B;
  --sage-lt:   #A8C5A0;
  --moss:      #4A6741;
  --rust:      #B5541E;
  --mist:      #EDE4D0;
  --white:     #FFFFFF;
  --border:    #D4C5A9;
  --border-dk: #B8A48A;
  --shadow:    rgba(42,31,14,0.10);
  --ev-inc:    #C49A6C;
  --ev-brd:    #6B8C6B;
  --ev-egg:    #B5541E;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Lato', sans-serif; background: var(--cream); color: var(--ink); min-height: 100dvh; }

header {
  background: var(--bark);
  color: var(--parchment);
  padding: 14px 16px 12px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 3px solid var(--tan);
}
header h1 { font-family: 'Playfair Display', serif; font-size: 1.25rem; font-weight: 700; color: var(--straw); letter-spacing: 0.02em; }
header p  { font-size: 0.72rem; color: var(--tan); margin-top: 1px; font-weight: 300; }
.header-add-btn {
  background: var(--straw); color: var(--bark); border: none; border-radius: 20px;
  padding: 7px 14px; font-family: 'Lato', sans-serif; font-size: 0.82rem; font-weight: 700;
  cursor: pointer; flex-shrink: 0; letter-spacing: 0.03em;
}

.woodgrain { height: 3px; background: repeating-linear-gradient(90deg,var(--tan) 0,var(--tan) 6px,var(--straw) 6px,var(--straw) 10px,var(--border-dk) 10px,var(--border-dk) 14px); opacity: 0.4; }

/* ── Tab nav ── */
.tab-nav {
  display: flex; background: var(--parchment); border-bottom: 1.5px solid var(--border);
}
.tab-btn {
  flex: 1; padding: 10px 0; font-family: 'Lato', sans-serif; font-size: 0.82rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.08em; color: var(--clay); background: none;
  border: none; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -1.5px;
  transition: color 0.15s, border-color 0.15s;
}
.tab-btn.active { color: var(--bark); border-bottom-color: var(--bark); }

/* ── Pages ── */
.page { display: none; }
.page.active { display: block; }

/* batches */
.batches-section { background: var(--parchment); border-bottom: 1px solid var(--border); padding: 10px 14px; }
.batches-title { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--clay); margin-bottom: 7px; }
.batch-list { display: flex; flex-direction: column; gap: 5px; }
.batch-item { display: flex; align-items: center; justify-content: space-between; background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 7px 11px; }
.batch-item-name { font-size: 0.85rem; font-weight: 700; color: var(--bark); }
.batch-item-date { font-size: 0.72rem; color: var(--clay); margin-top: 1px; }
.batch-actions { display: flex; gap: 5px; }
.batch-btn { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 3px 9px; font-size: 0.7rem; font-weight: 700; cursor: pointer; color: var(--clay); font-family: 'Lato', sans-serif; }
.batch-btn.archive { color: var(--sage); border-color: var(--sage-lt); }
.batch-btn.delete  { color: var(--rust); border-color: #E8B49A; }
.batch-archived { opacity: 0.45; }

/* calendar outer */
.calendar-outer { padding: 12px 12px 4px; }
.calendar-wrap {
  background: var(--white); border: 1.5px solid var(--border-dk);
  border-radius: 16px; overflow: hidden; box-shadow: 0 2px 10px var(--shadow);
  max-width: 460px; margin: 0 auto;
}
.cal-nav { display: flex; align-items: center; justify-content: space-between; background: var(--bark); padding: 9px 12px; }
.cal-nav button { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: var(--straw); padding: 2px 8px; border-radius: 6px; line-height: 1; }
.cal-nav h2 { font-family: 'Playfair Display', serif; font-size: 0.95rem; font-weight: 600; color: var(--straw); }

.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); border-left: 1px solid var(--mist); border-top: 1px solid var(--mist); }
.cal-dow { text-align: center; font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--clay); padding: 6px 0 5px; background: var(--parchment); border-right: 1px solid var(--mist); border-bottom: 1px solid var(--border); }
.cal-day { position: relative; display: flex; flex-direction: column; align-items: center; padding: 4px 2px 5px; border-right: 1px solid var(--mist); border-bottom: 1px solid var(--mist); cursor: pointer; min-height: 46px; background: var(--white); transition: background 0.12s; }
.cal-day:hover { background: var(--parchment); }
.cal-day.empty { cursor: default; background: var(--cream); }
.cal-day.other-month { background: var(--cream); }
.cal-day.other-month .day-num { color: var(--border-dk); }
.cal-day.today { background: #FFF8EC; }
.cal-day.today .day-num { background: var(--bark); color: var(--straw); border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; }
.cal-day.selected { background: var(--parchment); outline: 2px solid var(--tan); outline-offset: -2px; z-index: 1; }
.day-num { font-size: 0.78rem; font-weight: 700; color: var(--ink); width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.dot-row { display: flex; gap: 2px; justify-content: center; margin-top: 3px; flex-wrap: wrap; padding: 0 1px; }
.dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.dot-inc { background: var(--ev-inc); }
.dot-brd { background: var(--ev-brd); }

.legend { display: flex; gap: 14px; padding: 7px 14px 10px; justify-content: center; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.68rem; color: var(--clay); font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }

/* detail */
.detail-panel { padding: 14px 14px 80px; max-width: 460px; margin: 0 auto; }
.detail-date-header { font-family: 'Playfair Display', serif; font-size: 1.05rem; font-weight: 600; color: var(--bark); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid var(--mist); }
.no-selection { text-align: center; padding: 36px 20px; color: var(--clay); font-size: 0.88rem; }

.milestone-card { border-radius: 12px; border: 1px solid var(--border); border-left: 4px solid var(--ev-inc); background: var(--white); box-shadow: 0 1px 5px var(--shadow); padding: 12px 13px; margin-bottom: 10px; }
.milestone-card.brooder { border-left-color: var(--ev-brd); }
.milestone-card.custom-card { border-left-color: var(--moss); } font-weight: 700; text-transform: uppercase; letter-spacing: 0.09em; color: var(--tan); margin-bottom: 3px; }
.mc-label { font-family: 'Playfair Display', serif; font-size: 0.97rem; font-weight: 600; color: var(--bark); margin-bottom: 5px; }
.mc-action { font-size: 0.84rem; color: var(--clay); line-height: 1.55; }
.mc-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.badge { font-size: 0.67rem; font-weight: 700; padding: 3px 9px; border-radius: 20px; letter-spacing: 0.04em; line-height: 1.4; }
.badge-temp { background: #FFF0DC; color: #8B4A00; }
.badge-hum  { background: #E6F0FF; color: #1A4A8A; }
.badge-tip  { background: var(--parchment); color: var(--clay); border: 1px solid var(--border); }

.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 9px 18px; border-radius: 20px; border: none; font-family: 'Lato', sans-serif; font-size: 0.88rem; font-weight: 700; cursor: pointer; letter-spacing: 0.03em; transition: opacity 0.15s; }
.btn:active { opacity: 0.8; }
.btn-primary { background: var(--bark); color: var(--straw); }
.btn-sage    { background: var(--moss); color: #E0EDDC; }
.btn-rust    { background: var(--rust); color: #F9E0D4; }
.btn-cancel  { background: var(--mist); color: var(--clay); }
.btn-full    { width: 100%; }

.modal-overlay { position: fixed; inset: 0; background: rgba(42,31,14,0.55); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
.modal-overlay.hidden { display: none; }
.modal { background: var(--cream); border-radius: 20px 20px 0 0; border-top: 3px solid var(--tan); padding: 22px 18px 40px; width: 100%; max-width: 480px; }
.modal h3 { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; color: var(--bark); margin-bottom: 16px; }
.modal .input-group { margin-bottom: 11px; }
.modal-actions { display: flex; gap: 10px; margin-top: 16px; }

/* ── Egg log modal (centered) ── */
#egg-modal { align-items: center; padding: 16px; }
#egg-modal .modal { border-radius: 20px; padding: 22px 18px 24px; }
#egg-modal .input-group { margin-bottom: 11px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.input-group label { display: block; font-size: 0.67rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.09em; color: var(--clay); margin-bottom: 4px; }
.input-group input, .input-group textarea { width: 100%; padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 8px; font-family: 'Lato', sans-serif; font-size: 0.92rem; color: var(--ink); background: var(--parchment); -webkit-appearance: none; }
.input-group input:focus, .input-group textarea:focus { outline: none; border-color: var(--tan); background: var(--white); }
.input-group textarea { resize: vertical; min-height: 54px; }

.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(16px); background: var(--bark); color: var(--straw); padding: 9px 20px; border-radius: 20px; font-size: 0.84rem; font-weight: 700; opacity: 0; transition: opacity 0.25s, transform 0.25s; z-index: 999; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Export bar ── */
.export-bar { display: flex; gap: 8px; padding: 8px 14px 4px; justify-content: flex-end; max-width: 460px; margin: 0 auto; }
.export-btn { display: inline-flex; align-items: center; gap: 5px; background: none; border: 1.5px solid var(--border-dk); border-radius: 20px; padding: 5px 13px; font-family: 'Lato', sans-serif; font-size: 0.75rem; font-weight: 700; color: var(--clay); cursor: pointer; letter-spacing: 0.04em; text-decoration: none; }
.export-btn:hover { background: var(--parchment); }
.export-btn.print-btn { border-color: var(--bark); color: var(--bark); }

/* ── Egg Log Page ── */
.egg-page { padding: 12px 12px 80px; max-width: 460px; margin: 0 auto; }

.egg-page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.egg-page-header h2 { font-family: 'Playfair Display', serif; font-size: 1.05rem; font-weight: 600; color: var(--bark); }

.chart-card {
  background: var(--white); border: 1.5px solid var(--border-dk); border-radius: 16px;
  box-shadow: 0 2px 10px var(--shadow); overflow: hidden; margin-bottom: 14px;
}
.chart-header { background: var(--bark); padding: 9px 14px; display: flex; align-items: center; justify-content: space-between; }
.chart-title { font-family: 'Playfair Display', serif; font-size: 0.92rem; font-weight: 600; color: var(--straw); }
.range-pills { display: flex; gap: 4px; }
.range-pill {
  background: rgba(255,255,255,0.12); border: 1px solid rgba(232,200,122,0.3);
  color: var(--tan); border-radius: 20px; padding: 3px 10px;
  font-family: 'Lato', sans-serif; font-size: 0.68rem; font-weight: 700;
  letter-spacing: 0.06em; cursor: pointer; transition: background 0.15s, color 0.15s;
}
.range-pill.active { background: var(--straw); color: var(--bark); border-color: var(--straw); }
.chart-body { padding: 14px 10px 10px; position: relative; height: 200px; }

.chart-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); border-top: 1px solid var(--border); }
.stat-cell { background: var(--parchment); padding: 9px 10px; text-align: center; }
.stat-val { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; color: var(--bark); }
.stat-lbl { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--clay); margin-top: 1px; }

/* egg table */
.egg-table-wrap {
  background: var(--white); border: 1.5px solid var(--border-dk); border-radius: 16px;
  overflow: hidden; box-shadow: 0 2px 10px var(--shadow);
}
.egg-table-header { background: var(--bark); padding: 9px 14px; display: flex; align-items: center; justify-content: space-between; }
.egg-table-header span { font-family: 'Playfair Display', serif; font-size: 0.92rem; font-weight: 600; color: var(--straw); }
.egg-table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
.egg-table th { background: var(--parchment); padding: 7px 10px; text-align: left; font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.09em; color: var(--clay); border-bottom: 1px solid var(--border); }
.egg-table td { padding: 8px 10px; border-bottom: 1px solid var(--mist); vertical-align: top; }
.egg-table tr:last-child td { border-bottom: none; }
.egg-table tr:hover td { background: var(--parchment); }
.egg-count { font-family: 'Playfair Display', serif; font-size: 1.0rem; font-weight: 600; color: var(--bark); }
.egg-hens { font-size: 0.75rem; color: var(--clay); margin-top: 1px; }
.egg-notes-cell { font-size: 0.78rem; color: var(--clay); line-height: 1.4; }
.row-actions { display: flex; gap: 5px; white-space: nowrap; }
.tbl-btn { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 3px 8px; font-size: 0.68rem; font-weight: 700; cursor: pointer; color: var(--clay); font-family: 'Lato', sans-serif; }
.tbl-btn.edit   { color: var(--moss); border-color: var(--sage-lt); }
.tbl-btn.delete { color: var(--rust); border-color: #E8B49A; }
.empty-log { text-align: center; padding: 32px 20px; color: var(--clay); font-size: 0.85rem; }

/* ── Print styles ── */
@media print {
  header, .woodgrain, .batches-section, .export-bar, .legend,
  .cal-nav button, .header-add-btn, .tab-nav,
  .batch-actions, .modal-overlay, .toast, #egg-page { display: none !important; }
  #calendar-page { display: block !important; }

  body { background: white; font-size: 10pt; color: #000; }
  .calendar-outer { padding: 0; }
  .calendar-wrap { border: 1pt solid #999; border-radius: 0; box-shadow: none; max-width: 100%; page-break-inside: avoid; }
  .cal-nav { background: #3B2000; padding: 6pt 10pt; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .cal-nav h2 { color: #E8C87A; font-size: 12pt; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .cal-dow { background: #F5EDD8; font-size: 7pt; -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  .cal-day { min-height: 72pt; align-items: flex-start; padding: 3pt 4pt; border-color: #CCC; }
  .cal-day.today { background: #FFFAED; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .cal-day.today .day-num { background: #3B2000; color: #E8C87A; border-radius: 50%; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .day-num { font-size: 8pt; font-weight: 700; }
  .dot-row { display: none; }

  .print-events { display: flex !important; flex-direction: column; gap: 1pt; margin-top: 2pt; width: 100%; }
  .print-event { font-size: 6.5pt; line-height: 1.3; padding: 1pt 2pt; border-radius: 2pt; font-weight: 700; word-break: break-word; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .print-event.inc { background: #F5EDD8; color: #5C3D1E; }
  .print-event.brd { background: #E8F0E8; color: #2E4A2E; }

  .detail-panel { page-break-before: always; padding: 10pt; }
  .detail-date-header { font-size: 14pt; border-bottom: 1pt solid #CCC; }
  .milestone-card { box-shadow: none; border: 0.5pt solid #CCC; page-break-inside: avoid; }
}

@media screen { .print-events { display: none; } }
</style>
</head>
<body>

<header>
  <div>
    <h1>Quail Tracker</h1>
    <p id="header-sub">Tap a date to see details</p>
  </div>
  <button class="header-add-btn" id="header-action-btn" onclick="headerAction()">+ New Batch</button>
</header>
<div class="woodgrain"></div>

<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('calendar')">Calendar</button>
  <button class="tab-btn" onclick="switchTab('eggs')">Egg Log</button>
</div>

<!-- ══ CALENDAR PAGE ══ -->
<div class="page active" id="calendar-page">

  <div class="batches-section" id="batches-section"></div>

  <div class="calendar-outer">
    <div class="calendar-wrap">
      <div class="cal-nav">
        <button onclick="prevMonth()">&#8249;</button>
        <h2 id="cal-title"></h2>
        <button onclick="nextMonth()">&#8250;</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
  </div>

  <div class="woodgrain"></div>

  <div class="export-bar">
    <a class="export-btn" href="/calendar.ics" download="quail-tracker.ics">&#x2913; Download .ics</a>
    <button class="export-btn print-btn" onclick="window.print()">&#x2399; Print</button>
  </div>

  <div class="detail-panel" id="detail-panel">
    <div class="no-selection">Tap a date to see what&rsquo;s happening</div>
  </div>

</div><!-- /calendar-page -->

<!-- ══ EGG LOG PAGE ══ -->
<div class="page" id="egg-page">
  <div class="egg-page">

    <div class="egg-page-header">
      <h2>Egg Production</h2>
    </div>

    <!-- Chart card -->
    <div class="chart-card">
      <div class="chart-header">
        <span class="chart-title">Daily Egg Count</span>
        <div class="range-pills">
          <button class="range-pill" onclick="setRange(7)" id="pill-7">7D</button>
          <button class="range-pill active" onclick="setRange(30)" id="pill-30">30D</button>
          <button class="range-pill" onclick="setRange(90)" id="pill-90">3M</button>
          <button class="range-pill" onclick="setRange(365)" id="pill-365">1Y</button>
        </div>
      </div>
      <div class="chart-body">
        <canvas id="egg-chart"></canvas>
      </div>
      <div class="chart-stats">
        <div class="stat-cell"><div class="stat-val" id="stat-total">—</div><div class="stat-lbl">Total Eggs</div></div>
        <div class="stat-cell"><div class="stat-val" id="stat-avg">—</div><div class="stat-lbl">Daily Avg</div></div>
        <div class="stat-cell"><div class="stat-val" id="stat-best">—</div><div class="stat-lbl">Best Day</div></div>
      </div>
    </div>

    <!-- Table -->
    <div class="egg-table-wrap">
      <div class="egg-table-header">
        <span>All Entries</span>
        <button class="export-btn" onclick="exportEggLog()" style="border-color:rgba(232,200,122,0.4);color:var(--straw);">&#x2913; Export .csv</button>
      </div>
      <div id="egg-table-body"></div>
    </div>

  </div>
</div><!-- /egg-page -->

<!-- New Batch Modal -->
<div class="modal-overlay hidden" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <h3>New Incubation Batch</h3>
    <div class="input-group"><label>Batch Name</label><input type="text" id="batch-name" placeholder="e.g. March eBay batch"></div>
    <div class="input-group"><label>Date Eggs Were Set</label><input type="date" id="batch-start-date"></div>
    <div class="modal-actions">
      <button class="btn btn-cancel btn-full" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary btn-full" onclick="saveBatch()">Save Batch</button>
    </div>
  </div>
</div>

<!-- Egg Entry Modal -->
<div class="modal-overlay hidden" id="egg-modal" onclick="closeEggModalOutside(event)">
  <div class="modal" id="egg-modal-inner">
    <h3 id="egg-modal-title">Log Eggs</h3>
    <div class="input-group"><label>Date</label><input type="date" id="egg-date"></div>
    <div class="form-row">
      <div class="input-group"><label>Eggs Collected</label><input type="number" id="egg-count" min="0" placeholder="0"></div>
      <div class="input-group"><label>Hens Laying</label><input type="number" id="egg-hens" min="0" placeholder="—"></div>
    </div>
    <div class="input-group"><label>Notes</label><textarea id="egg-notes" placeholder="Any observations..."></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-cancel btn-full" onclick="closeEggModal()">Cancel</button>
      <button class="btn btn-sage btn-full" onclick="saveEggModal()">Save Entry</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Custom Event Modal -->
<div class="modal-overlay hidden" id="custom-modal" onclick="closeCustomModalOutside(event)" style="align-items:center;padding:16px;">
  <div class="modal" style="border-radius:20px;padding:22px 18px 24px;">
    <h3 id="custom-modal-title">Add Event</h3>
    <div class="input-group" style="margin-bottom:11px"><label>Date</label><input type="date" id="custom-date"></div>
    <div class="input-group" style="margin-bottom:11px"><label>Title</label><input type="text" id="custom-title" placeholder="e.g. Start holding eggs for next batch"></div>
    <div class="input-group" style="margin-bottom:11px"><label>Notes (optional)</label><textarea id="custom-note" placeholder="Any details..."></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-cancel btn-full" onclick="closeCustomModal()">Cancel</button>
      <button class="btn btn-primary btn-full" onclick="saveCustomEvent()">Save Event</button>
    </div>
  </div>
</div>

<script>
let appData={batches:[],egg_log:[],custom_events:[]}, calYear, calMonth, selectedDateStr=null;
let currentRange=30, eggChart=null, editingEggDate=null, currentTab='calendar';

const INC=[
  {day:0, label:"Eggs Set",       type:"milestone", action:"Confirm incubator stable at 99.5\u00b0F / 45\u201355% humidity. Start auto-turner.",       temp:"99.5\u00b0F", hum:"45\u201355%", tip:"Rest shipped eggs pointy-end down 12\u201324h before setting."},
  {day:7, label:"First Candle",   type:"milestone", action:"Candle eggs. Remove clearly infertile eggs or early quitters.",                              temp:"99.5\u00b0F", hum:"45\u201355%", tip:"Veins = developing. Fully clear = likely infertile. Dark mass with movement = great."},
  {day:14,label:"Second Candle",  type:"milestone", action:"Final candle before lockdown. Remove any late quitters.",                                    temp:"99.5\u00b0F", hum:"45\u201355%", tip:"Air cell should be large and well-defined. Target 13\u201315% egg weight loss by today."},
  {day:15,label:"Lockdown",       type:"milestone", action:"Stop turning eggs. Raise humidity. Do NOT open incubator until hatch is complete.",         temp:"99.5\u00b0F", hum:"65\u201370%", tip:"Lay eggs on their sides. Resist opening the lid \u2014 humidity loss kills chicks during hatch."},
  {day:17,label:"Hatch Begins",   type:"milestone", action:"Watch for pipping and zipping. Do not assist unless a chick is stuck for 24h+.",            temp:"99.5\u00b0F", hum:"70%",        tip:"Coturnix hatch fast. Do not open the lid \u2014 shrink-wrapping is a real risk."},
  {day:18,label:"Hatch Complete", type:"milestone", action:"Move dry fluffy chicks to brooder. Discard unhatched eggs after 24h.",                      temp:"99.5\u00b0F", hum:"70%",        tip:"Chicks survive 24\u201348h on yolk reserves. Don\u2019t rush them while still wet."},
];
const BRD=[
  {day:0, label:"Move to Brooder",         type:"milestone", action:"Set up brooder at 95\u00b0F. Dip beaks in water. Chick starter feed. Marbles in water dish.", temp:"95\u00b0F", tip:"Paper towels on floor first 3 days \u2014 easier to clean, prevents leg splaying."},
  {day:7, label:"Week 1 \u2014 Drop Temp", type:"milestone", action:"Reduce brooder temp to 90\u00b0F. Check for pasty butt daily.",                               temp:"90\u00b0F", tip:"Piling up = cold. Spread to edges = hot."},
  {day:14,label:"Week 2 \u2014 Drop Temp", type:"milestone", action:"Reduce brooder temp to 85\u00b0F.",                                                           temp:"85\u00b0F", tip:"Switch floor to pine shavings if not already done."},
  {day:21,label:"Sexing Window",            type:"milestone", action:"Sex by feather coloration. Begin culling plan for extra roosters.",                            temp:"80\u00b0F", tip:"Pharaoh males: rusty-red chest. Females: speckled/tan. Cull beyond 1:4\u20135 ratio."},
  {day:28,label:"Move to Permanent Cage",  type:"milestone", action:"Chicks are fully feathered and ready for permanent housing. Transition off heat entirely if ambient temps are above 65\u00b0F.", temp:"Ambient", tip:"1/4\" hardware cloth floor, 1/2\u00d71\" walls. Ensure predator protection before moving outdoors. Set up free-choice oyster shell and game bird feed now if not already done."},
  {day:42,label:"Harvest Window",          type:"milestone", action:"Extra roosters ready for harvest (~4\u20135 oz dressed weight).",                              temp:"Ambient", tip:"Hens may begin laying around this time \u2014 watch for eggs."},
  {day:56,label:"Full Production",         type:"milestone", action:"All keepers at full size. Consistent egg laying expected from hens.",                          temp:"Ambient", tip:"Target colony ratio: 1 rooster per 4\u20135 hens."},
];

function parseLocal(s){if(!s)return null;const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function toDS(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function todayStr(){return toDS(new Date());}
function fmtFull(s){return parseLocal(s).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});}
function fmtShort(s){return parseLocal(s).toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function fmtMed(s){return parseLocal(s).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}

/* ── Tab switching ── */
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['calendar','eggs'][i]===tab));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(tab==='calendar'?'calendar-page':'egg-page').classList.add('active');
  const btn=document.getElementById('header-action-btn');
  const sub=document.getElementById('header-sub');
  if(tab==='calendar'){
    btn.textContent='+ New Batch';btn.onclick=openAddBatch;
    sub.textContent='Tap a date to see details';
  } else {
    btn.textContent='+ Log Eggs';btn.onclick=()=>openEggModal(todayStr());
    sub.textContent='Egg production log';
    renderEggPage();
  }
}

/* ── Calendar ── */
function buildEventMap(){
  const map={};
  const add=(ds,ev)=>{if(!map[ds])map[ds]=[];map[ds].push(ev);};
  appData.batches.forEach(b=>{
    if(!b.start_date)return;
    const start=parseLocal(b.start_date), hatch=addDays(start,18);
    INC.forEach(m=>add(toDS(addDays(start,m.day)),{...m,batchName:b.name,batchId:b.id,active:b.active}));
    BRD.forEach(m=>add(toDS(addDays(hatch,m.day)),{...m,batchName:b.name,batchId:b.id,active:b.active}));
  });
  (appData.custom_events||[]).forEach(e=>add(e.date,{type:'custom',label:e.title,note:e.note,id:e.id}));
  return map;
}

function renderCalendar(){
  const em=buildEventMap(), today=todayStr();
  const first=new Date(calYear,calMonth,1), last=new Date(calYear,calMonth+1,0);
  document.getElementById('cal-title').textContent=first.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const grid=document.getElementById('cal-grid'); grid.innerHTML='';
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d=>{const el=document.createElement('div');el.className='cal-dow';el.textContent=d;grid.appendChild(el);});
  for(let i=0;i<first.getDay();i++){const el=document.createElement('div');el.className='cal-day empty';grid.appendChild(el);}
  for(let d=1;d<=last.getDate();d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const evs=em[ds]||[], el=document.createElement('div');
    el.className='cal-day'+(ds===today?' today':'')+(ds===selectedDateStr?' selected':'');
    el.onclick=()=>selectDate(ds);
    const num=document.createElement('div');num.className='day-num';num.textContent=d;el.appendChild(num);
    if(evs.length){
      const row=document.createElement('div');row.className='dot-row';
      const dot=document.createElement('div');dot.className='dot dot-brd';
      row.appendChild(dot);
      el.appendChild(row);
      const pe=document.createElement('div');pe.className='print-events';
      evs.filter(e=>e.type==='milestone').forEach(e=>{
        const ev=document.createElement('div');
        ev.className='print-event brd';
        ev.textContent=e.label+(e.batchName?' · '+e.batchName:'');
        pe.appendChild(ev);
      });
      if(pe.children.length) el.appendChild(pe);
    }
    grid.appendChild(el);
  }
}

function selectDate(ds){selectedDateStr=ds;renderCalendar();renderDetail(ds);}

function renderDetail(ds){
  const em=buildEventMap(), evs=em[ds]||[], panel=document.getElementById('detail-panel');
  const milestones=evs.filter(e=>e.type==='milestone');
  const customs=evs.filter(e=>e.type==='custom');
  let html=`<div class="detail-date-header">${fmtFull(ds)}</div>`;
  if(!milestones.length&&!customs.length) html+=`<p style="font-size:0.85rem;color:var(--clay);margin-bottom:12px;">Nothing scheduled today.</p>`;
  milestones.forEach(m=>{
    html+=`<div class="milestone-card">
      <div class="mc-batch">${m.batchName}${!m.active?' · archived':''}</div>
      <div class="mc-label">${m.label}</div>
      <div class="mc-action">${m.action}</div>
      <div class="mc-badges">
        ${m.temp?`<span class="badge badge-temp">${m.temp}</span>`:''}
        ${m.hum?`<span class="badge badge-hum">${m.hum}</span>`:''}
        ${m.tip?`<span class="badge badge-tip">${m.tip}</span>`:''}
      </div>
    </div>`;
  });
  customs.forEach(e=>{
    html+=`<div class="milestone-card custom-card">
      <div class="mc-batch">Custom Event</div>
      <div class="mc-label">${e.label}</div>
      ${e.note?`<div class="mc-action">${e.note}</div>`:''}
      <div style="margin-top:8px;display:flex;gap:6px;">
        <button class="tbl-btn edit" onclick="openCustomModal('${ds}','${e.id}')">Edit</button>
        <button class="tbl-btn delete" onclick="deleteCustomEvent('${e.id}')">Delete</button>
      </div>
    </div>`;
  });
  html+=`<button class="btn btn-primary" style="margin-top:12px;width:100%" onclick="openCustomModal('${ds}',null)">+ Add Event</button>`;
  panel.innerHTML=html;
}

/* ── Egg Log Page ── */
function setRange(days){
  currentRange=days;
  document.querySelectorAll('.range-pill').forEach(p=>p.classList.remove('active'));
  document.getElementById('pill-'+days).classList.add('active');
  renderChart();
}

function getWindowedLog(days){
  const cutoff=toDS(addDays(new Date(), -days+1));
  return appData.egg_log.filter(e=>e.date>=cutoff).sort((a,b)=>a.date.localeCompare(b.date));
}

function renderChart(){
  const log=getWindowedLog(currentRange);
  const labels=log.map(e=>fmtShort(e.date));
  const data=log.map(e=>e.eggs);

  // Stats (over full windowed range)
  const total=data.reduce((s,v)=>s+v,0);
  const avg=data.length?Math.round(total/data.length*10)/10:0;
  const best=data.length?Math.max(...data):0;
  document.getElementById('stat-total').textContent=data.length?total:'—';
  document.getElementById('stat-avg').textContent=data.length?avg:'—';
  document.getElementById('stat-best').textContent=data.length?best:'—';

  const ctx=document.getElementById('egg-chart').getContext('2d');

  const gradient=ctx.createLinearGradient(0,0,0,180);
  gradient.addColorStop(0,'rgba(181,84,30,0.35)');
  gradient.addColorStop(1,'rgba(181,84,30,0.02)');

  if(eggChart) eggChart.destroy();

  eggChart=new Chart(ctx,{
    type:'line',
    data:{
      labels,
      datasets:[{
        data,
        borderColor:'#B5541E',
        backgroundColor:gradient,
        borderWidth:2,
        pointBackgroundColor:'#B5541E',
        pointRadius:data.length>60?0:3,
        pointHoverRadius:5,
        fill:true,
        tension:0.35,
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{
        backgroundColor:'#2A1F0E',
        titleColor:'#E8C87A',
        bodyColor:'#F5EDD8',
        padding:9,
        cornerRadius:8,
        callbacks:{
          title:items=>labels[items[0].dataIndex],
          label:item=>`${item.raw} egg${item.raw!==1?'s':''}`
        }
      }},
      scales:{
        x:{
          ticks:{color:'#8B5E3C',font:{size:10},maxTicksLimit:8,maxRotation:0},
          grid:{color:'rgba(212,197,169,0.3)'},
          border:{color:'rgba(212,197,169,0.5)'}
        },
        y:{
          beginAtZero:true,
          ticks:{color:'#8B5E3C',font:{size:10},stepSize:1,precision:0},
          grid:{color:'rgba(212,197,169,0.3)'},
          border:{color:'rgba(212,197,169,0.5)'}
        }
      }
    }
  });
}

function renderEggTable(){
  const sorted=[...appData.egg_log].sort((a,b)=>b.date.localeCompare(a.date));
  const wrap=document.getElementById('egg-table-body');
  if(!sorted.length){
    wrap.innerHTML=`<div class="empty-log">No egg entries yet.<br>Tap &ldquo;+ Log Eggs&rdquo; to add your first entry.</div>`;
    return;
  }
  let html=`<table class="egg-table"><thead><tr>
    <th>Date</th><th>Eggs</th><th>Notes</th><th></th>
  </tr></thead><tbody>`;
  sorted.forEach(e=>{
    html+=`<tr>
      <td style="white-space:nowrap">
        <div style="font-size:0.83rem;font-weight:700;color:var(--ink)">${fmtMed(e.date)}</div>
        ${e.hens?`<div class="egg-hens">${e.hens} hens</div>`:''}
      </td>
      <td><span class="egg-count">${e.eggs}</span></td>
      <td class="egg-notes-cell">${e.notes||''}</td>
      <td>
        <div class="row-actions">
          <button class="tbl-btn edit" onclick="openEggModal('${e.date}')">Edit</button>
          <button class="tbl-btn delete" onclick="deleteEgg('${e.date}')">✕</button>
        </div>
      </td>
    </tr>`;
  });
  wrap.innerHTML=html+'</tbody></table>';
}

function exportEggLog(){
  if(!appData.egg_log.length){showToast('No entries to export');return;}
  const rows=appData.egg_log.slice().sort((a,b)=>a.date.localeCompare(b.date));
  const csv=[
    ['Date','Eggs Collected','Hens Laying','Notes'].join(','),
    ...rows.map(e=>[
      e.date,
      e.eggs!=null?e.eggs:0,
      e.hens!=null?e.hens:'',
      '"'+(e.notes||'').replace(/"/g,'""')+'"'
    ].join(','))
  ].join('\r\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='quail-egg-log.csv';
  document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},100);
}

function renderEggPage(){
  renderChart();
  renderEggTable();
}

/* ── Egg Modal ── */
function openEggModal(ds){
  editingEggDate=ds;
  const existing=appData.egg_log.find(e=>e.date===ds);
  document.getElementById('egg-modal-title').textContent=existing?'Edit Entry':'Log Eggs';
  document.getElementById('egg-date').value=ds;
  document.getElementById('egg-count').value=existing?existing.eggs:'';
  document.getElementById('egg-hens').value=existing&&existing.hens?existing.hens:'';
  document.getElementById('egg-notes').value=existing?existing.notes||'':'';
  document.getElementById('egg-modal').classList.remove('hidden');
  setTimeout(()=>document.getElementById('egg-count').focus(),50);
}
function closeEggModal(){document.getElementById('egg-modal').classList.add('hidden');editingEggDate=null;}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeEggModal();closeCustomModal();}});
function closeEggModalOutside(e){if(e.target===document.getElementById('egg-modal'))closeEggModal();}

async function saveEggModal(){
  const ds=document.getElementById('egg-date').value;
  const eggs=document.getElementById('egg-count').value;
  if(!ds){showToast('Choose a date');return;}
  if(eggs===''){showToast('Enter an egg count');return;}
  const entry={date:ds,eggs:parseInt(eggs),hens:document.getElementById('egg-hens').value||null,notes:document.getElementById('egg-notes').value||''};
  await fetch('/api/egg_log',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(entry)});
  const idx=appData.egg_log.findIndex(e=>e.date===ds);
  if(idx>=0)appData.egg_log[idx]=entry;else{appData.egg_log.push(entry);appData.egg_log.sort((a,b)=>a.date.localeCompare(b.date));}
  closeEggModal();showToast('Saved');
  if(currentTab==='eggs') renderEggPage();
}

async function deleteEgg(ds){
  if(!confirm(`Delete entry for ${fmtMed(ds)}?`))return;
  await fetch(`/api/egg_log/${ds}`,{method:'DELETE'});
  appData.egg_log=appData.egg_log.filter(e=>e.date!==ds);
  showToast('Entry deleted');
  if(currentTab==='eggs') renderEggPage();
}

/* ── Batches ── */
function renderBatches(){
  const el=document.getElementById('batches-section');
  if(!appData.batches.length){el.innerHTML=`<div class="batches-title">No batches yet — add one to get started</div>`;return;}
  let html=`<div class="batches-title">Active Batches</div><div class="batch-list">`;
  appData.batches.forEach(b=>{
    const hatch=toDS(addDays(parseLocal(b.start_date),18));
    html+=`<div class="batch-item">
      <div class="batch-item-info"><div class="batch-item-name">${b.name}</div><div class="batch-item-date">Set ${fmtShort(b.start_date)} &middot; Hatch ~${fmtShort(hatch)}</div></div>
      <div class="batch-actions"><button class="batch-btn delete" onclick="deleteBatch('${b.id}')">&times;</button></div>
    </div>`;
  });
  el.innerHTML=html+'</div>';
}

function headerAction(){openAddBatch();}
function openAddBatch(){document.getElementById('batch-name').value='';document.getElementById('batch-start-date').value=todayStr();document.getElementById('modal-overlay').classList.remove('hidden');}
function closeModal(){document.getElementById('modal-overlay').classList.add('hidden');}
function closeModalOutside(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}

async function saveBatch(){
  const name=document.getElementById('batch-name').value.trim(), start=document.getElementById('batch-start-date').value;
  if(!name||!start){showToast('Name and date are required');return;}
  const res=await fetch('/api/batches',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,start_date:start})});
  const batch=await res.json();
  appData.batches.push(batch);closeModal();showToast(`${name} added`);
  const d=parseLocal(start);calYear=d.getFullYear();calMonth=d.getMonth();
  renderBatches();renderCalendar();
}
async function deleteBatch(id){
  await fetch(`/api/batches/${id}`,{method:'DELETE'});
  appData.batches=appData.batches.filter(b=>b.id!==id);
  showToast('Batch deleted');renderBatches();renderCalendar();
}

function prevMonth(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar();}
function nextMonth(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar();}

function genId(){return'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return(c==='x'?r:(r&0x3|0x8)).toString(16);});}
let editingCustomId=null;
function openCustomModal(ds,id){
  editingCustomId=id;
  const existing=id?(appData.custom_events||[]).find(e=>e.id===id):null;
  document.getElementById('custom-modal-title').textContent=existing?'Edit Event':'Add Event';
  document.getElementById('custom-date').value=existing?existing.date:ds;
  document.getElementById('custom-title').value=existing?existing.title:'';
  document.getElementById('custom-note').value=existing?existing.note||'':'';
  document.getElementById('custom-modal').classList.remove('hidden');
  setTimeout(()=>document.getElementById('custom-title').focus(),50);
}
function closeCustomModal(){document.getElementById('custom-modal').classList.add('hidden');editingCustomId=null;}
function closeCustomModalOutside(e){if(e.target===document.getElementById('custom-modal'))closeCustomModal();}

async function saveCustomEvent(){
  const title=document.getElementById('custom-title').value.trim();
  const ds=document.getElementById('custom-date').value;
  if(!title){showToast('Enter a title');return;}
  if(!ds){showToast('Choose a date');return;}
  if(!appData.custom_events)appData.custom_events=[];
  if(editingCustomId){
    const ev=appData.custom_events.find(e=>e.id===editingCustomId);
    if(ev){ev.date=ds;ev.title=title;ev.note=document.getElementById('custom-note').value||'';}
  } else {
    appData.custom_events.push({id:genId(),date:ds,title,note:document.getElementById('custom-note').value||''});
  }
  await fetch('/api/custom_events',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(appData.custom_events)});
  closeCustomModal();showToast('Saved');renderCalendar();renderDetail(ds);selectedDateStr=ds;
}

async function deleteCustomEvent(id){
  appData.custom_events=(appData.custom_events||[]).filter(e=>e.id!==id);
  await fetch('/api/custom_events',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(appData.custom_events)});
  showToast('Event deleted');renderCalendar();if(selectedDateStr)renderDetail(selectedDateStr);
}

async function init(){
  const now=new Date();calYear=now.getFullYear();calMonth=now.getMonth();
  const res=await fetch('/api/data');appData=await res.json();
  if(!appData.batches)appData.batches=[];
  if(!appData.egg_log)appData.egg_log=[];
  if(!appData.custom_events)appData.custom_events=[];
  renderBatches();renderCalendar();selectDate(todayStr());
}
init();
</script>
</body>
</html>
